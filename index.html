<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emy Pure</title>

<style>
body {margin:0;font-family:Arial;background:#f6f6f6;}

/* TOP BAR */
.topbar {
background:#f4c542;
text-align:center;
padding:10px;
font-weight:bold;
}

/* HEADER */
header {
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* BANNER */
.banner img {width:100%;}

/* SECTION TITLE */
.title {
text-align:center;
font-size:24px;
margin:20px 0;
}

/* PRODUCTS */
.products {
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card {
background:white;
border-radius:12px;
overflow:hidden;
}

.card img {width:100%;}

.info {padding:10px;}

.price {font-weight:bold;}

.btn {
display:block;
margin-top:10px;
background:#2c1e17;
color:white;
padding:10px;
text-align:center;
text-decoration:none;
border-radius:6px;
}

/* BEFORE AFTER */
.before-after {
display:flex;
}

.before-after img {
width:50%;
}

/* BENEFITS */
.benefits {
padding:20px;
background:white;
}

.benefits h3 {
text-align:center;
}

</style>

</head>

<body>

<div class="topbar">FREE Shipping on Prepaid Orders</div>

<header>EMY PURE</header>

<div class="banner">
<img src="banner.jpg">
</div>

<div class="title">Our Products</div>

<div class="products">

<div class="card">
<img src="scrub1.jpg">
<div class="info">
<h4>Chocolate Coffee Scrub</h4>
<div class="price">Rs.1480</div>
<a class="btn" href="https://wa.me/923264017575?text=Order Coffee Scrub">Order Now</a>
</div>
</div>

<div class="card">
<img src="scrub2.jpg">
<div class="info">
<h4>Hibiscus Scrub</h4>
<div class="price">Rs.1200</div>
<a class="btn" href="https://wa.me/923264017575?text=Order Hibiscus">Order Now</a>
</div>
</div>

<div class="card">
<img src="scrub3.jpg">
<div class="info">
<h4>Turmeric Kojic Scrub</h4>
<div class="price">Rs.1300</div>
<a class="btn" href="https://wa.me/923264017575?text=Order Turmeric Scrub">Order Now</a>
</div>
</div>

</div>

<div class="title">Results</div>

<div class="before-after">
<img src="before.jpg">
<img src="after.jpg">
</div>

<div class="title">Lip Results</div>

<div class="before-after">
<img src="lips.jpg">
<img src="lips.jpg">
</div>

<div class="benefits">
<h3>Why Choose Us?</h3>
<p>✔ Removes dead skin</p>
<p>✔ Brightens skin</p>
<p>✔ Gives natural glow</p>
<p>✔ Smooth & soft skin</p>
</div>

</body>
</html>
